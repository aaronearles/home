services:
  coder-db:
    image: postgres:17
    container_name: coder-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: coder
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: coder
    volumes:
      - coder_db_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coder -d coder"]
      interval: 10s
      timeout: 5s
      retries: 5

  coder:
    image: ghcr.io/coder/coder:latest
    container_name: coder
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # ports:
    #   - "7080:7080"
    networks:
      - traefik
      - backend
    depends_on:
      coder-db:
        condition: service_healthy
    # group_add value is patched by run.sh at deploy time
    group_add:
      - "${DOCKER_GID}"
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik
      - traefik.http.routers.coder.rule=Host(`coder.internal.earles.io`)
      - traefik.http.routers.coder.entrypoints=websecure
      - traefik.http.routers.coder.tls.certresolver=production
      - traefik.http.services.coder.loadbalancer.server.port=7080

volumes:
  coder_db_data:

networks:
  traefik:
    external: true
  backend:
    external: false
